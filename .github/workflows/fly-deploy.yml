name: Fly Deploy

# Auto-deploy to Fly.io on every push to main.
# Requires a repo secret FLY_API_TOKEN — create it with:
#   fly tokens create deploy -x 999999h
# then add it in GitHub → Settings → Secrets and variables → Actions
# (or: gh secret set FLY_API_TOKEN --body "<token>")

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group   # never run two deploys at once
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly (skips until FLY_API_TOKEN is set)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN is not set — skipping deploy."
            echo "Add it (fly tokens create deploy -> gh secret set FLY_API_TOKEN) to enable auto-deploy."
            exit 0
          fi
          flyctl deploy --remote-only

name: Fly Deploy

# Auto-deploy to Fly.io on every push to main.
# Requires a repo secret FLY_API_TOKEN — create it with:
#   fly tokens create deploy -x 999999h
# then add it in GitHub → Settings → Secrets and variables → Actions
# (or: gh secret set FLY_API_TOKEN --body "<token>")

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group   # never run two deploys at once
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
